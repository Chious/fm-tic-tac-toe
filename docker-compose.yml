services:
  server:
    build:
      context: ./server
      dockerfile: src/Dockerfile
    container_name: fm-tic-tac-toe-server
    ports:
      - "2567:2567"
    environment:
      - NODE_ENV=production
      - PORT=2567
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fm-tic-tac-toe-client
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    depends_on:
      - server
    restart: unless-stopped

